<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Friend2Friend</title>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#22c55e"/>
    <path d="M30 30h28l-22 36h26" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</template>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #e6e6ea;
    font-family: -apple-system, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #stage { transform-origin: center center; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px; border-radius: 999px; background: #e4e4e7;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; margin-top: -7px;
    width: 20px; height: 20px; border-radius: 50%; background: #0a0a0a;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3); cursor: pointer;
  }
  textarea, input { font-family: inherit; }
  @keyframes f2fToast { from { transform: translateY(-14px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes f2fFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes f2fSheet { from { transform: translateY(100%); } to { transform: none; } }
</style>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="sheets.jsx"></script>
  <script type="text/babel" src="discover.jsx"></script>
  <script type="text/babel" src="messages.jsx"></script>
  <script type="text/babel" src="leaderboard.jsx"></script>
  <script type="text/babel" src="profile.jsx"></script>
  <script type="text/babel" src="onboarding.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    function fitStage() {
      const stage = document.getElementById('stage');
      const w = 402, h = 874;
      const s = Math.min(window.innerWidth / w, window.innerHeight / h, 1) * 0.98;
      stage.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fitStage);
    fitStage();
    setInterval(fitStage, 800);
  </script>
</body>
</html>
